<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رسم للتصميم والخدمات التعليمية</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      background: #eefcff;
      font-family: Arial, sans-serif;
    }

    .page-link {
      display: block;
      width: 100%;
      min-height: 100vh;
      background-image: url("bg.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center top;
      cursor: pointer;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .page-link {
        background-size: contain;
        background-position: center top;
      }
    }
  </style>
</head>

<body>
  <a
    class="page-link"
    href="https://www.rasmcom.com"
    target="_blank"
    aria-label="زيارة موقع رسم للتصميم والخدمات التعليمية">
  </a>
</body>
</html>
